<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Buddhabrot" />
<meta name="description" content="A premium, fully interactive 3D/4D Buddhabrot exploration instrument. Runs on any device." />
<title>Buddhabrot · 4D Volumetric Explorer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d111a'/%3E%3Ctext x='16' y='23' font-size='20' font-family='sans-serif' font-weight='800' text-anchor='middle' fill='%23d8b46a'%3EB%3C/text%3E%3C/svg%3E" />
<style>
:root{
  --bg:#05060a; --panel:rgba(14,17,26,.82); --panel-solid:#0d111a;
  --stroke:rgba(120,140,190,.14); --stroke-strong:rgba(140,165,220,.28);
  --text:#e8edf7; --dim:#8590a8; --accent:#d8b46a; --accent-2:#5fd3e6;
  --accent-grad:linear-gradient(135deg,#e7c884,#c79a4f);
  --shadow:0 18px 50px rgba(0,0,0,.55); --radius:14px;
  font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;touch-action:none}
#view{position:fixed;inset:0;width:100vw;height:100vh;display:block}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:9px 18px;
  border-radius:999px;background:rgba(10,12,18,.6);border:1px solid var(--stroke);
  color:var(--dim);font-size:12.5px;letter-spacing:.3px;backdrop-filter:blur(10px);
  pointer-events:none;transition:opacity 1.2s ease;z-index:30;text-align:center}
#panel-toggle{position:fixed;top:18px;right:18px;z-index:40;width:42px;height:42px;
  border-radius:11px;background:var(--panel);color:var(--accent);
  border:1px solid var(--stroke-strong);font-size:18px;cursor:pointer;
  backdrop-filter:blur(14px);box-shadow:var(--shadow);transition:transform .2s,background .2s}
#panel-toggle:hover{transform:rotate(35deg);background:var(--panel-solid)}
.panel{position:fixed;top:0;right:0;height:100vh;width:360px;max-width:100vw;
  background:var(--panel);backdrop-filter:blur(22px) saturate(1.2);
  border-left:1px solid var(--stroke-strong);box-shadow:var(--shadow);
  overflow-y:auto;overflow-x:hidden;z-index:35;padding-bottom:40px;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  scrollbar-width:thin;scrollbar-color:var(--stroke-strong) transparent}
body.panel-hidden .panel{transform:translateX(105%)}
.panel::-webkit-scrollbar{width:9px}
.panel::-webkit-scrollbar-thumb{background:var(--stroke-strong);border-radius:8px}
.panel-header{display:flex;align-items:center;gap:13px;padding:20px 20px 16px;
  position:sticky;top:0;z-index:2;border-bottom:1px solid var(--stroke);
  background:linear-gradient(180deg,rgba(13,17,26,.96),rgba(13,17,26,.72))}
.panel-header .logo{width:40px;height:40px;border-radius:11px;flex:none;display:grid;
  place-items:center;font-weight:800;font-size:20px;color:#1a1407;background:var(--accent-grad);
  box-shadow:0 6px 18px rgba(216,180,106,.35)}
.panel-header h1{margin:0;font-size:16px;letter-spacing:3px;font-weight:700}
.panel-header .titles span{font-size:10.5px;color:var(--dim);letter-spacing:1.4px;text-transform:uppercase}
.section{border-bottom:1px solid var(--stroke)}
.section-head{width:100%;display:flex;align-items:center;gap:10px;background:none;border:none;
  color:var(--text);padding:14px 20px;font-size:12.5px;font-weight:600;letter-spacing:.6px;
  cursor:pointer;text-transform:uppercase;text-align:left}
.section-head .chev{color:var(--accent);transition:transform .22s;font-size:11px}
.section.open .section-head .chev{transform:rotate(90deg)}
.section-body{display:none;padding:4px 20px 18px}
.section.open .section-body{display:block}
.note{font-size:11.5px;color:var(--dim);line-height:1.5;margin:2px 0 14px}
.ctrl{margin:13px 0}
.ctrl>label{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;
  color:var(--dim);margin-bottom:7px;letter-spacing:.3px}
.ctrl>label .val{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;
  outline:none;cursor:pointer;background:linear-gradient(90deg,rgba(216,180,106,.5),rgba(95,211,230,.25))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#fff;border:2px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;
  border:2px solid var(--accent);cursor:pointer}
.ctrl.check{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12.5px;color:var(--text)}
.ctrl.check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
select{width:100%;padding:9px 11px;border-radius:9px;background:var(--panel-solid);color:var(--text);
  border:1px solid var(--stroke-strong);font-size:12.5px;cursor:pointer}
input[type=color]{width:100%;height:32px;padding:2px;border-radius:9px;
  border:1px solid var(--stroke-strong);background:var(--panel-solid);cursor:pointer}
.btn{appearance:none;border:1px solid var(--stroke-strong);border-radius:10px;
  background:rgba(30,36,52,.6);color:var(--text);padding:9px 12px;font-size:12px;cursor:pointer;
  font-weight:500;transition:background .16s,border-color .16s,transform .1s}
.btn:hover{background:rgba(48,56,80,.8);border-color:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--accent-grad);color:#1a1407;border:none;font-weight:700}
.btn.primary:hover{filter:brightness(1.07)}
.btn.wide{width:100%;margin-bottom:10px;padding:12px}
.btn-row,.preset-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preset-row .btn{font-size:11.5px}
.stats{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats>div{background:rgba(8,10,16,.55);border:1px solid var(--stroke);border-radius:10px;padding:9px 11px}
.stats span{display:block;font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stats b{font-size:15px;font-weight:700;color:var(--accent-2);font-variant-numeric:tabular-nums}
.fatal{position:fixed;inset:0;display:grid;place-items:center;padding:24px;z-index:100;
  background:radial-gradient(circle at 50% 40%,#0c1020,#050609)}
.fatal-card{max-width:480px;background:var(--panel-solid);border:1px solid var(--stroke-strong);
  border-radius:16px;padding:30px 32px;box-shadow:var(--shadow)}
.fatal-card h2{margin:0 0 12px;color:var(--accent)}
.fatal-card p{color:var(--text);line-height:1.6;font-size:13.5px}
/* ---- mobile bottom sheet (golden-standard) ---- */
.sheet-handle{display:none}
body.sheet .panel{
  left:0;right:0;top:auto;bottom:0;width:100%;height:88vh;max-height:88vh;
  border-left:none;border-top:1px solid var(--stroke-strong);
  border-radius:20px 20px 0 0;box-shadow:0 -18px 50px rgba(0,0,0,.55);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:max(28px,env(safe-area-inset-bottom));
  overscroll-behavior:contain;
}
body.sheet.panel-hidden .panel{transform:translateY(100%)!important}
body.sheet .panel-header{position:static;padding-top:6px}
body.sheet .sheet-handle{
  position:sticky;top:0;z-index:5;display:flex;justify-content:center;align-items:center;
  padding:11px 0 7px;cursor:grab;touch-action:none;
  background:linear-gradient(180deg,rgba(13,17,26,.98),rgba(13,17,26,.82));
}
body.sheet .sheet-handle:active{cursor:grabbing}
body.sheet .sheet-handle::before{content:"";width:44px;height:5px;border-radius:3px;
  background:var(--stroke-strong)}
@media (max-width:560px){
  body:not(.sheet) .panel{width:100vw}
}
</style>

<body>
<canvas id="view"></canvas>
<button id="panel-toggle" title="Toggle controls">⚙</button>
<div id="hint">Drag to turn · two-finger pan · pinch zoom · twist to roll · double-tap to centre</div>

<script>
"use strict";
// =====================================================================================
//  Buddhabrot · 4D Volumetric Explorer — single-file edition
//
//  Self-contained: raw WebGL2 + a main-thread, time-sliced progressive Monte-Carlo
//  sampler. No dependencies, no build step, no special HTTP headers. Runs from a
//  double-clicked file, a static host, or a phone browser.
//
//  Orbits of z -> z^2 + c live in the 4D space (Re c, Im c, Re z, Im z). We rotate that
//  space (six rotation-plane angles), project it into a 3D density grid, and render the
//  grid with an emission/absorption volumetric raymarcher.
// =====================================================================================

// ------------------------------------------------------------------ configuration model
function defaultConfig(){
  var threads = (navigator.hardwareConcurrency||4);
  return {
    sampling:{ cMinRe:-2.2,cMaxRe:0.9,cMinIm:-1.4,cMaxIm:1.4, z0Re:0,z0Im:0,
      bailout:4, minIter:16, capR:2400,capG:360,capB:64, skipInterior:true, mirror:true },
    geometry:{ a01:0,a02:0.35,a03:0,a12:0,a13:0.55,a23:0, span:2.3,
      centerX:0.45,centerY:0,centerZ:0, animate:false, animPlane:'a03', animSpeed:0.06 },
    volume:{ resolution: (threads<=4?80:96) },
    render:{ rayMarchSteps:224, renderScale:1.0, exposure:0.95, expR:1.7,expG:1.0,expB:0.7,
      gamma:2.2, logDensity:true, logScale:20, density:1.0, absorb:2.4, toneMap:'aces',
      saturation:1.5, background:'#05060a', showBox:false, jitter:1.0 },
    camera:{ autoRotate:true, autoRotateSpeed:0.35, fov:45, sensitivity:1.0, inertia:0.92, invertY:false },
    perf:{ budgetMs:9, uploadInterval:380 }
  };
}
var TONE={none:0,reinhard:1,aces:2,filmic:3};

var PRESETS=[
  {name:'Golden Relief',apply:function(c){
    A(c.geometry,{a01:0,a02:0.35,a03:0,a12:0,a13:0.55,a23:0,span:2.3,centerX:0.45});
    A(c.sampling,{capR:2400,capG:360,capB:64,minIter:16});
    A(c.render,{logScale:20,absorb:2.4,exposure:0.95,density:1.0,expR:1.7,expG:1.0,expB:0.7,saturation:1.5,gamma:2.2,toneMap:'aces'});}},
  {name:'Cosmic Nebula',apply:function(c){
    A(c.geometry,{a01:0,a02:0.9,a03:0.6,a12:0.4,a13:0.9,a23:0.3,span:2.4,centerX:0.2});
    A(c.sampling,{capR:5000,capG:700,capB:90,minIter:10});
    A(c.render,{logScale:28,absorb:2.2,exposure:1.0,density:1.0,expR:1.2,expG:1.05,expB:1.4,saturation:1.5,gamma:2.1,toneMap:'aces'});}},
  {name:'Orbit Tunnel',apply:function(c){
    A(c.geometry,{a01:0.5,a02:1.2,a03:0,a12:0,a13:1.2,a23:0.7,span:2.6,centerX:0.1});
    A(c.sampling,{capR:3000,capG:450,capB:70,minIter:24});
    A(c.render,{logScale:16,absorb:3.0,exposure:1.1,density:1.1,expR:1.6,expG:1.1,expB:0.9,saturation:1.7,gamma:2.0,toneMap:'filmic'});}},
  {name:'Stardust',apply:function(c){
    A(c.geometry,{a01:0.2,a02:0.6,a03:0.4,a12:0.3,a13:0.7,a23:0.2,span:2.4,centerX:0.25});
    A(c.sampling,{capR:8000,capG:1100,capB:130,minIter:6});
    A(c.render,{logScale:40,absorb:1.6,exposure:0.85,density:0.9,expR:1.4,expG:1.0,expB:1.2,saturation:1.4,gamma:2.2,toneMap:'aces'});}},
  {name:'Deep Filaments',apply:function(c){
    A(c.geometry,{a01:0.1,a02:0.5,a03:0.2,a12:0.1,a13:0.6,a23:0.1,span:2.3,centerX:0.4});
    A(c.sampling,{capR:16000,capG:2000,capB:240,minIter:40});
    A(c.render,{logScale:60,absorb:1.4,exposure:0.9,density:0.9,expR:1.5,expG:1.1,expB:0.95,saturation:1.6,gamma:2.2,toneMap:'aces'});}},
  {name:'Monochrome Ink',apply:function(c){
    A(c.sampling,{capR:1400,capG:1400,capB:1400,minIter:8});
    A(c.render,{logScale:18,absorb:3.2,exposure:1.0,density:1.1,expR:1.0,expG:1.0,expB:1.0,saturation:0.0,gamma:2.1,toneMap:'filmic'});}}
];
function A(o,s){for(var k in s)o[k]=s[k];return o;}

// ------------------------------------------------------------------ tiny mat4 (column-major)
var M={
  perspective:function(fovy,aspect,n,f){var t=1/Math.tan(fovy/2);var nf=1/(n-f);
    return [t/aspect,0,0,0, 0,t,0,0, 0,0,(f+n)*nf,-1, 0,0,2*f*n*nf,0];},
  lookAt:function(e,c,u){
    var zx=e[0]-c[0],zy=e[1]-c[1],zz=e[2]-c[2];var zl=Math.hypot(zx,zy,zz)||1;zx/=zl;zy/=zl;zz/=zl;
    var xx=u[1]*zz-u[2]*zy,xy=u[2]*zx-u[0]*zz,xz=u[0]*zy-u[1]*zx;var xl=Math.hypot(xx,xy,xz)||1;xx/=xl;xy/=xl;xz/=xl;
    var yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;
    return [xx,yx,zx,0, xy,yy,zy,0, xz,yz,zz,0, -(xx*e[0]+xy*e[1]+xz*e[2]),-(yx*e[0]+yy*e[1]+yz*e[2]),-(zx*e[0]+zy*e[1]+zz*e[2]),1];},
  mul:function(a,b){var o=new Array(16);for(var c=0;c<4;c++)for(var r=0;r<4;r++){var s=0;
    for(var k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s;}return o;},
  invert:function(m){
    var a00=m[0],a01=m[1],a02=m[2],a03=m[3],a10=m[4],a11=m[5],a12=m[6],a13=m[7],
        a20=m[8],a21=m[9],a22=m[10],a23=m[11],a30=m[12],a31=m[13],a32=m[14],a33=m[15];
    var b00=a00*a11-a01*a10,b01=a00*a12-a02*a10,b02=a00*a13-a03*a10,b03=a01*a12-a02*a11,
        b04=a01*a13-a03*a11,b05=a02*a13-a03*a12,b06=a20*a31-a21*a30,b07=a20*a32-a22*a30,
        b08=a20*a33-a23*a30,b09=a21*a32-a22*a31,b10=a21*a33-a23*a31,b11=a22*a33-a23*a32;
    var det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06; if(!det)return null; det=1/det;
    return [(a11*b11-a12*b10+a13*b09)*det,(a02*b10-a01*b11-a03*b09)*det,(a31*b05-a32*b04+a33*b03)*det,(a22*b04-a21*b05-a23*b03)*det,
            (a12*b08-a10*b11-a13*b07)*det,(a00*b11-a02*b08+a03*b07)*det,(a32*b02-a30*b05-a33*b01)*det,(a20*b05-a22*b02+a23*b01)*det,
            (a10*b10-a11*b08+a13*b06)*det,(a01*b08-a00*b10-a03*b06)*det,(a30*b04-a31*b02+a33*b00)*det,(a21*b02-a20*b04-a23*b00)*det,
            (a11*b07-a10*b09-a12*b06)*det,(a00*b09-a01*b07+a02*b06)*det,(a31*b01-a30*b03-a32*b00)*det,(a20*b03-a21*b01+a22*b00)*det];}
};

// ------------------------------------------------------------------ quaternions (camera arcball)
var Q = {
  mul: function (a, b) {
    return [
      a[3]*b[0] + a[0]*b[3] + a[1]*b[2] - a[2]*b[1],
      a[3]*b[1] - a[0]*b[2] + a[1]*b[3] + a[2]*b[0],
      a[3]*b[2] + a[0]*b[1] - a[1]*b[0] + a[2]*b[3],
      a[3]*b[3] - a[0]*b[0] - a[1]*b[1] - a[2]*b[2],
    ];
  },
  axisAngle: function (x, y, z, ang) { var h = ang * 0.5, s = Math.sin(h); return [x*s, y*s, z*s, Math.cos(h)]; },
  norm: function (q) { var l = Math.hypot(q[0], q[1], q[2], q[3]) || 1; return [q[0]/l, q[1]/l, q[2]/l, q[3]/l]; },
  // rotate vec3 v by quaternion q
  rot: function (q, v) {
    var x=q[0], y=q[1], z=q[2], w=q[3], vx=v[0], vy=v[1], vz=v[2];
    var ix = w*vx + y*vz - z*vy, iy = w*vy + z*vx - x*vz, iz = w*vz + x*vy - y*vx, iw = -x*vx - y*vy - z*vz;
    return [ix*w + iw*-x + iy*-z - iz*-y, iy*w + iw*-y + iz*-x - ix*-z, iz*w + iw*-z + ix*-y - iy*-x];
  },
  slerp: function (a, b, t) {
    var d = a[0]*b[0] + a[1]*b[1] + a[2]*b[2] + a[3]*b[3];
    if (d < 0) { b = [-b[0], -b[1], -b[2], -b[3]]; d = -d; }
    if (d > 0.9995) return Q.norm([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t, a[3]+(b[3]-a[3])*t]);
    var th = Math.acos(d), s = Math.sin(th), w1 = Math.sin((1-t)*th)/s, w2 = Math.sin(t*th)/s;
    return [a[0]*w1+b[0]*w2, a[1]*w1+b[1]*w2, a[2]*w1+b[2]*w2, a[3]*w1+b[3]*w2];
  },
  // quaternion from a right-handed orthonormal basis given as columns ex, ey, ez
  fromBasis: function (ex, ey, ez) {
    var m00=ex[0], m10=ex[1], m20=ex[2], m01=ey[0], m11=ey[1], m21=ey[2], m02=ez[0], m12=ez[1], m22=ez[2];
    var tr = m00 + m11 + m22, q;
    if (tr > 0) { var s = Math.sqrt(tr + 1) * 2; q = [(m21-m12)/s, (m02-m20)/s, (m10-m01)/s, 0.25*s]; }
    else if (m00 > m11 && m00 > m22) { var s2 = Math.sqrt(1 + m00 - m11 - m22) * 2; q = [0.25*s2, (m01+m10)/s2, (m02+m20)/s2, (m21-m12)/s2]; }
    else if (m11 > m22) { var s3 = Math.sqrt(1 + m11 - m00 - m22) * 2; q = [(m01+m10)/s3, 0.25*s3, (m12+m21)/s3, (m02-m20)/s3]; }
    else { var s4 = Math.sqrt(1 + m22 - m00 - m11) * 2; q = [(m02+m20)/s4, (m12+m21)/s4, 0.25*s4, (m10-m01)/s4]; }
    return Q.norm(q);
  },
};

// Symmetric 3x3 eigen-decomposition (Jacobi). Returns sorted-descending
// eigenvalues and their (column) eigenvectors. Used to align the figure's
// principal axes to the screen.
function eigenSym3(a) {
  var m = [[a[0][0], a[0][1], a[0][2]], [a[1][0], a[1][1], a[1][2]], [a[2][0], a[2][1], a[2][2]]];
  var v = [[1,0,0],[0,1,0],[0,0,1]];
  for (var iter = 0; iter < 24; iter++) {
    var p = 0, q = 1, off = Math.abs(m[0][1]);
    if (Math.abs(m[0][2]) > off) { off = Math.abs(m[0][2]); p = 0; q = 2; }
    if (Math.abs(m[1][2]) > off) { off = Math.abs(m[1][2]); p = 1; q = 2; }
    if (off < 1e-12) break;
    var app = m[p][p], aqq = m[q][q], apq = m[p][q];
    var phi = 0.5 * Math.atan2(2 * apq, aqq - app), c = Math.cos(phi), s = Math.sin(phi);
    for (var k = 0; k < 3; k++) {
      var mkp = m[k][p], mkq = m[k][q];
      m[k][p] = c*mkp - s*mkq; m[k][q] = s*mkp + c*mkq;
    }
    for (k = 0; k < 3; k++) {
      var mpk = m[p][k], mqk = m[q][k];
      m[p][k] = c*mpk - s*mqk; m[q][k] = s*mpk + c*mqk;
    }
    for (k = 0; k < 3; k++) {
      var vkp = v[k][p], vkq = v[k][q];
      v[k][p] = c*vkp - s*vkq; v[k][q] = s*vkp + c*vkq;
    }
  }
  var vals = [m[0][0], m[1][1], m[2][2]];
  var vecs = [[v[0][0],v[1][0],v[2][0]], [v[0][1],v[1][1],v[2][1]], [v[0][2],v[1][2],v[2][2]]];
  var order = [0,1,2].sort(function (i, j) { return vals[j] - vals[i]; });

// ------------------------------------------------------------------ application
function App(){
  this.cfg=defaultConfig();
  var canvas=document.getElementById('view');
  this.renderer=new Renderer(canvas);
  this.sampler=new Sampler();
  this.running=true; this.lastUpload=0; this.lastStatT=performance.now();
  this.lastSamples=0; this.rate=0; this.frames=[]; this.t0=performance.now();
  var self=this;
  this.panel=new Panel(this.cfg,{
    apply:function(k){self.apply(k);},
    toggleRun:function(){self.running=!self.running;return self.running;},
    reset:function(){self.sampler.reset(self.cfg);self.lastSamples=0;},
    screenshot:function(){self.screenshot();},
    preset:function(i){self.preset(i);},
    resetCamera:function(){ var d=self.renderer.DEFAULT_CAM, c=self.renderer.cam;
      c.dist=d.dist; c.target=d.target.slice(); c.vYaw=0; c.vPitch=0;
      self.targetQuat=d.q.slice(); self.slewTo=performance.now()+360; },
    centerFit:function(){self.centerFit();},
    alignAxes:function(){self.alignAxes();},
    snapView:function(w){self.snapView(w);}
  });
  document.body.appendChild(this.panel.el);
  this.installControls(canvas);
  window.addEventListener('resize',function(){self.renderer.resize(self.cfg.render.renderScale);});
  // boot
  this.renderer.resize(this.cfg.render.renderScale);
  this.renderer.cam.fov=this.cfg.camera.fov;
  this.sampler.alloc(this.cfg.volume.resolution);
  this.renderer.allocVolume(this.cfg.volume.resolution);
  this.sampler.reset(this.cfg);
  this.renderer.applyRender(this.cfg.render);
  this.setupSheet();
  window.buddhabrot=this;
  this.loop();
}
// Frame the whole figure inside the currently visible region (accounts for the
// mobile sheet inset via the live render aspect ratio).
App.prototype.fitToView=function(){
  var a=this.sampler.analyze(); if(!a)return; var c=this.renderer.cam;
  c.target=[a.centroid[0],a.centroid[1],a.centroid[2]];
  var e=eigenSym3(a.cov);
  var R=Math.sqrt(Math.max(e.values[0]+e.values[1]+e.values[2],1e-6))*2.25; // bounding radius
  var aspect=this.renderer.lastAspect||(window.innerWidth/window.innerHeight);
  var fv=this.cfg.camera.fov*Math.PI/180, fh=2*Math.atan(Math.tan(fv/2)*aspect);
  var dist=Math.max(R/Math.tan(fv/2), R/Math.tan(fh/2))*1.06;
  c.dist=Math.max(0.8,Math.min(30,dist));
};
// Golden-standard mobile bottom sheet: draggable, snaps to peek / half / full,
// keeps the figure visible above it. Desktop keeps the side drawer untouched.
App.prototype.setupSheet=function(){
  var self=this, panel=this.panel.el, body=document.body;
  var mq=window.matchMedia('(max-width: 700px)');
  var handle=document.createElement('div'); handle.className='sheet-handle';
  panel.insertBefore(handle, panel.firstChild);
  var S={H:0,t:0,snaps:{full:0,half:0,peek:0},name:'half',dragging:false,sy:0,st:0};
  function recalc(){ S.H=panel.offsetHeight;
    S.snaps={ full:0, half:Math.round(S.H*0.46), peek:Math.max(0,S.H-70) }; }
  function inset(){ var open=mq.matches && !body.classList.contains('panel-hidden');
    self.renderer.bottomInset = open ? Math.max(0,S.H-S.t) : 0; }
  function setT(t){ S.t=t; panel.style.transform='translateY('+t+'px)'; inset(); }
  function snap(name){ S.name=name; panel.style.transition=''; setT(S.snaps[name]||0); self.fitToView(); }
  function enable(on){ body.classList.toggle('sheet',on);
    if(on){ recalc(); body.classList.add('panel-hidden'); setT(S.snaps.half); self.renderer.bottomInset=0; }
    else { panel.style.transform=''; panel.style.transition=''; self.renderer.bottomInset=0; }
    self.fitToView(); }
  function ds(y){ if(!mq.matches)return; S.dragging=true; S.sy=y; S.st=S.t; panel.style.transition='none'; }
  function dm(y){ if(!S.dragging)return; var nt=Math.min(S.snaps.peek,Math.max(0,S.st+(y-S.sy))); setT(nt); }
  function de(){ if(!S.dragging)return; S.dragging=false; panel.style.transition='';
    var best='half',bd=1e9; for(var k in S.snaps){var d=Math.abs(S.snaps[k]-S.t); if(d<bd){bd=d;best=k;}} snap(best); }
  handle.addEventListener('touchstart',function(e){ds(e.touches[0].clientY);},{passive:true});
  handle.addEventListener('touchmove',function(e){e.preventDefault();dm(e.touches[0].clientY);},{passive:false});
  handle.addEventListener('touchend',de); handle.addEventListener('touchcancel',de);
  handle.addEventListener('mousedown',function(e){e.preventDefault();ds(e.clientY);});
  window.addEventListener('mousemove',function(e){dm(e.clientY);});
  window.addEventListener('mouseup',de);
  // react after the ⚙ toggle flips .panel-hidden
  document.getElementById('panel-toggle').addEventListener('click',function(){
    setTimeout(function(){ if(!mq.matches)return;
      if(!body.classList.contains('panel-hidden')){ recalc(); setT(S.snaps[S.name]||S.snaps.half); }
      inset(); self.fitToView(); },0); });
  var onMq=function(){enable(mq.matches);};
  if(mq.addEventListener) mq.addEventListener('change',onMq); else if(mq.addListener) mq.addListener(onMq);
  window.addEventListener('resize',function(){ if(mq.matches){ recalc(); setT(S.snaps[S.name]||S.snaps.half); } });
  enable(mq.matches);
};
App.prototype.apply=function(kind){
  if(kind==='render'){ this.renderer.applyRender(this.cfg.render); }
  else if(kind==='camera'){ this.renderer.cam.fov=this.cfg.camera.fov; }
  else if(kind==='scale'){ this.renderer.resize(this.cfg.render.renderScale); }
  else if(kind==='compute'){ this.sampler.reset(this.cfg); this.lastSamples=0; }
  else if(kind==='resolution'){ var r=this.cfg.volume.resolution;
    this.sampler.alloc(r); this.renderer.allocVolume(r); this.sampler.reset(this.cfg); this.lastSamples=0; }
};
App.prototype.preset=function(i){ PRESETS[i].apply(this.cfg); this.panel.refresh();
  this.renderer.applyRender(this.cfg.render); this.renderer.cam.fov=this.cfg.camera.fov;
  this.sampler.reset(this.cfg); this.lastSamples=0; };
App.prototype.screenshot=function(){ var self=this; this.renderer.draw((performance.now()-this.t0)/1000);
  this.renderer.canvas.toBlob(function(b){var a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download='buddhabrot-'+Date.now()+'.png';a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);}); };
App.prototype.installControls=function(canvas){
  // World-class object manipulation: quaternion trackball (no gimbal lock,
  // grab-and-turn from any orientation) + screen-space pan + dolly zoom + roll.
  //   mouse:  left-drag = rotate · right/middle/shift-drag = pan · wheel = zoom · dbl-click = center & fit
  //   touch:  1 finger = rotate · 2 fingers = pan + pinch-zoom + twist (roll) simultaneously · dbl-tap = center & fit
  var self=this, c=this.renderer.cam;
  var mode=0; // 0 none, 1 rotate, 2 pan
  var px=0, py=0;
  var t2=null;       // last two-finger {cx,cy,dist,ang}
  var lastTap=0;

  this.dragging=false;

  function rotate(dx,dy){
    var s = 0.006 * self.cfg.camera.sensitivity;
    var sy = self.cfg.camera.invertY ? -1 : 1;
    var yaw = -dx*s, pitch = -dy*s*sy;
    c.q = Q.norm(Q.mul(c.q, Q.mul(Q.axisAngle(0,1,0,yaw), Q.axisAngle(1,0,0,pitch))));
    c.vYaw = yaw; c.vPitch = pitch;          // seed inertia
  }
  function roll(d){ c.q = Q.norm(Q.mul(c.q, Q.axisAngle(0,0,1,d))); }
  function pan(dx,dy){
    // Move the look-at point in the camera screen plane (figure follows the fingers).
    var h = self.renderer.canvas.height / (Math.min(window.devicePixelRatio,2));
    var world = (2*c.dist*Math.tan(c.fov*Math.PI/360))/Math.max(1,h);
    var r=Q.rot(c.q,[1,0,0]), u=Q.rot(c.q,[0,1,0]);
    for(var i=0;i<3;i++) c.target[i] += (-dx*world)*r[i] + (dy*world)*u[i];
  }
  function zoom(f){ c.dist = Math.max(0.6, Math.min(30, c.dist*f)); }

  // ---- mouse ----
  canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  canvas.addEventListener('mousedown', function(e){
    self.dragging=true; c.vYaw=0; c.vPitch=0; px=e.clientX; py=e.clientY;
    mode = (e.button===0 && !e.shiftKey) ? 1 : 2;
  });
  window.addEventListener('mousemove', function(e){
    if(!self.dragging)return; var dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY;
    if(mode===1) rotate(dx,dy); else pan(dx,dy);
  });
  window.addEventListener('mouseup', function(){ self.dragging=false; mode=0; });
  canvas.addEventListener('wheel', function(e){ e.preventDefault();
    zoom(1 + Math.sign(e.deltaY)*0.08); }, {passive:false});
  canvas.addEventListener('dblclick', function(e){ e.preventDefault(); self.centerFit(); });

  // ---- touch ----
  function twoFinger(e){
    var a=e.touches[0], b=e.touches[1];
    return { cx:(a.clientX+b.clientX)/2, cy:(a.clientY+b.clientY)/2,
      dist:Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY),
      ang:Math.atan2(b.clientY-a.clientY, b.clientX-a.clientX) };
  }
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault(); c.vYaw=0; c.vPitch=0;
    if(e.touches.length===1){ self.dragging=true; mode=1; px=e.touches[0].clientX; py=e.touches[0].clientY;
      var now=performance.now(); if(now-lastTap<300){ self.centerFit(); } lastTap=now;
    } else if(e.touches.length===2){ self.dragging=true; mode=0; t2=twoFinger(e); }
  }, {passive:false});
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    if(e.touches.length===1 && mode===1){
      var dx=e.touches[0].clientX-px, dy=e.touches[0].clientY-py; px=e.touches[0].clientX; py=e.touches[0].clientY;
      rotate(dx,dy);
    } else if(e.touches.length===2 && t2){
      var n=twoFinger(e);
      pan(n.cx-t2.cx, n.cy-t2.cy);                 // two-finger drag → pan
      if(t2.dist>0) zoom(t2.dist/n.dist);          // pinch → dolly
      var da=n.ang-t2.ang; if(da>Math.PI)da-=2*Math.PI; if(da<-Math.PI)da+=2*Math.PI;
      roll(da);                                    // twist → roll
      t2=n;
    }
  }, {passive:false});
  canvas.addEventListener('touchend', function(e){
    if(e.touches.length===0){ self.dragging=false; mode=0; t2=null; }
    else if(e.touches.length===1){ mode=1; px=e.touches[0].clientX; py=e.touches[0].clientY; t2=null; }
  });
};

// Center the figure in frame (look at its density centroid) and dolly to fit.
App.prototype.centerFit=function(){
  var a=this.sampler.analyze(); if(!a)return; var c=this.renderer.cam;
  c.target=[a.centroid[0],a.centroid[1],a.centroid[2]];
  var e=eigenSym3(a.cov);
  var ext=Math.sqrt(Math.max(e.values[0],1e-6))*2.4;   // ~2.4σ along the broadest axis
  c.dist=Math.max(0.8,Math.min(30, ext/Math.tan(c.fov*Math.PI/360)));
};

// Align the figure's principal axes to the screen (broadest → horizontal,
// next → vertical, thinnest → toward the camera) and center + fit.
App.prototype.alignAxes=function(){
  var a=this.sampler.analyze(); if(!a)return; var c=this.renderer.cam;
  var e=eigenSym3(a.cov);
  var ex=e.vectors[0].slice(), ey=e.vectors[1].slice(), ez=e.vectors[2].slice();
  // enforce right-handed basis (ez = ex × ey)
  var cx=ex[1]*ey[2]-ex[2]*ey[1], cy=ex[2]*ey[0]-ex[0]*ey[2], cz=ex[0]*ey[1]-ex[1]*ey[0];
  if(cx*ez[0]+cy*ez[1]+cz*ez[2] < 0){ ez=[-ez[0],-ez[1],-ez[2]]; }
  ez=[cx,cy,cz];
  this.targetQuat = Q.fromBasis(ex,ey,ez);
  this.slewTo = performance.now()+520;                 // smooth slerp handled in loop
  c.target=[a.centroid[0],a.centroid[1],a.centroid[2]];
  var ext=Math.sqrt(Math.max(e.values[0],1e-6))*2.4;
  c.dist=Math.max(0.8,Math.min(30, ext/Math.tan(c.fov*Math.PI/360)));
  this.cfg.camera.autoRotate=false; this.panel.refresh();
};

// Snap to a canonical axis-aligned view; centers on the figure.
App.prototype.snapView=function(which){
  var a=this.sampler.analyze(); var c=this.renderer.cam;
  if(a){ c.target=[a.centroid[0],a.centroid[1],a.centroid[2]];
    var e=eigenSym3(a.cov); var ext=Math.sqrt(Math.max(e.values[0],1e-6))*2.6;
    c.dist=Math.max(0.8,Math.min(30, ext/Math.tan(c.fov*Math.PI/360))); }
  var q;
  if(which==='front') q=[0,0,0,1];
  else if(which==='back') q=Q.axisAngle(0,1,0,Math.PI);
  else if(which==='right') q=Q.axisAngle(0,1,0,Math.PI/2);
  else if(which==='left') q=Q.axisAngle(0,1,0,-Math.PI/2);
  else if(which==='top') q=Q.axisAngle(1,0,0,-Math.PI/2);
  else if(which==='bottom') q=Q.axisAngle(1,0,0,Math.PI/2);
  else q=Q.norm(Q.mul(Q.axisAngle(1,0,0,-0.42),Q.axisAngle(0,1,0,0.6))); // iso
  this.targetQuat=Q.norm(q); this.slewTo=performance.now()+420;
  this.cfg.camera.autoRotate=false; this.panel.refresh();
};
App.prototype.loop=function(){
  var self=this; var now=performance.now();
  this.frames.push(now); while(this.frames.length>30)this.frames.shift();
  // animate 4D plane (throttled recompute)
  if(this.cfg.geometry.animate){ var g=this.cfg.geometry; g[g.animPlane]+=g.animSpeed*0.05;
    if(g[g.animPlane]>Math.PI)g[g.animPlane]-=2*Math.PI; this._animDirty=true; this.panel.refresh(); }
  // camera dynamics: slew-to-target (snap/align), rotational inertia, auto-orbit
  var c=this.renderer.cam;
  if(this.targetQuat){
    // ease toward target orientation via slerp; finish when close or timed out
    c.q=Q.slerp(c.q,this.targetQuat,0.18);
    var dot=Math.abs(c.q[0]*this.targetQuat[0]+c.q[1]*this.targetQuat[1]+c.q[2]*this.targetQuat[2]+c.q[3]*this.targetQuat[3]);
    if(dot>0.99999||now>this.slewTo){ c.q=this.targetQuat; this.targetQuat=null; }
  } else if(!this.dragging){
    if(Math.abs(c.vYaw)>1e-5||Math.abs(c.vPitch)>1e-5){
      c.q=Q.norm(Q.mul(c.q,Q.mul(Q.axisAngle(0,1,0,c.vYaw),Q.axisAngle(1,0,0,c.vPitch))));
      var dmp=this.cfg.camera.inertia; c.vYaw*=dmp; c.vPitch*=dmp;
    }
    if(this.cfg.camera.autoRotate) c.q=Q.norm(Q.mul(c.q,Q.axisAngle(0,1,0,this.cfg.camera.autoRotateSpeed*0.01)));
  }
  // sample
  if(this.running) this.sampler.runFor(this.cfg.perf.budgetMs);
  // periodic upload + stats
  var interval=Math.max(80,this.cfg.perf.uploadInterval);
  if(now-this.lastUpload>=interval){ this.lastUpload=now;
    if(this._animDirty && (!this._animAt||now>=this._animAt)){ this._animDirty=false; this._animAt=now+Math.max(interval,300);
      this.sampler.reset(this.cfg); this.lastSamples=0; }
    this.renderer.upload(this.sampler.pack());
    var dt=(now-this.lastStatT)/1000;
    if(dt>0){ this.rate=(this.sampler.samples-this.lastSamples)/dt; this.lastSamples=this.sampler.samples; this.lastStatT=now; }
    var fps=this.frames.length>1?(this.frames.length-1)*1000/(this.frames[this.frames.length-1]-this.frames[0]):0;
    this.panel.setStats(this.sampler.samples,this.sampler.hits,Math.max(0,this.rate),fps);
  }
  this.renderer.draw((now-this.t0)/1000);
  requestAnimationFrame(function(){self.loop();});
};

// ------------------------------------------------------------------ boot
function fatal(msg){var o=document.createElement('div');o.className='fatal';
  o.innerHTML='<div class="fatal-card"><h2>Unable to start</h2><p>'+msg+'</p>'+
  '<p style="color:#8590a8;font-size:12.5px;margin-top:12px">This explorer needs a browser with WebGL2 (all current Chrome, Firefox, Edge and Safari builds).</p></div>';
  document.body.appendChild(o);}
window.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('panel-toggle');
  btn.addEventListener('click',function(){document.body.classList.toggle('panel-hidden');});
  setTimeout(function(){var h=document.getElementById('hint');if(h)h.style.opacity='0';},6000);
  try{ new App(); }catch(e){ fatal((e&&e.message)?e.message:String(e)); }
});
</script>
